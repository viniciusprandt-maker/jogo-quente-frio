<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo Quente ou Frio</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f0f0f0;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    #resultado {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🔥❄️ Jogo: Quente ou Frio</h1>
  <p>Tente adivinhar o número entre <b>10 e 100</b></p>
  <p>Você tem <b>10 tentativas</b></p>

  <input type="number" id="palpite" placeholder="Digite seu palpite">
  <br>
  <button onclick="tentar()">Tentar</button>

  <div id="resultado"></div>

  <!-- Sons -->
  <audio id="somAcerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
  <audio id="somErro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

  <script>
    let numeroSecreto = Math.floor(Math.random() * 91) + 10;
    let tentativas = 10;

    function tentar() {
      let palpite = parseInt(document.getElementById("palpite").value);
      let resultado = document.getElementById("resultado");

      if (isNaN(palpite)) {
        resultado.innerHTML = "⚠️ Digite um número válido!";
        return;
      }

      if (tentativas <= 0) {
        resultado.innerHTML = "💀 Suas tentativas acabaram! O número era " + numeroSecreto;
        return;
      }

      tentativas--;

      let diferenca = Math.abs(numeroSecreto - palpite);

      if (palpite === numeroSecreto) {
        resultado.innerHTML = "🎉 Acertou! O número era " + numeroSecreto;
        document.getElementById("somAcerto").play(); // som de acerto
        return;
      } else {
        document.getElementById("somErro").play(); // 🔊 som de erro
      }

      if (diferenca <= 5) {
        resultado.innerHTML = "🔥 Muito quente! Tentativas restantes: " + tentativas;
      } else if (diferenca <= 15) {
        resultado.innerHTML = "🌡️ Quente... Tentativas restantes: " + tentativas;
      } else if (diferenca <= 30) {
        resultado.innerHTML = "❄️ Frio... Tentativas restantes: " + tentativas;
      } else {
        resultado.innerHTML = "🥶 Muito frio! Tentativas restantes: " + tentativas;
      }

      if (tentativas === 0) {
        resultado.innerHTML += "<br>💀 Fim de jogo! O número era " + numeroSecreto;
      }
    }
  </script>

</body>
</html>
